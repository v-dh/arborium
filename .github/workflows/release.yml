name: Release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].[0-9][0-9]'

permissions: {}

env:
  CARGO_TERM_COLOR: always
  NIGHTLY_TOOLCHAIN: nightly-2025-11-30

jobs:
  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate tag format
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]{8}\.[0-9]{2}$ ]]; then
            echo "tag must match YYYYMMDD.NN (example: 20260301.01)"
            exit 1
          fi

  fmt:
    name: Format
    needs: validate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@a7c938ee233ac44ef6f2fba5ac2d30fa12584c6e # just
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: ${{ env.NIGHTLY_TOOLCHAIN }}
          components: rustfmt
      - run: just format-check

  clippy:
    name: Clippy
    needs: validate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@a7c938ee233ac44ef6f2fba5ac2d30fa12584c6e # just
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: ${{ env.NIGHTLY_TOOLCHAIN }}
          components: clippy
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libavahi-client-dev
      - run: just lint

  test:
    name: Test
    needs: validate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@a7c938ee233ac44ef6f2fba5ac2d30fa12584c6e # just
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: ${{ env.NIGHTLY_TOOLCHAIN }}
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libavahi-client-dev
      - run: just test

  ghostty-vt:
    name: Ghostty VT
    needs: validate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUSTFLAGS: -L native=${{ github.workspace }}/target/ghostty-vt-bridge/lib -C link-arg=-Wl,-rpath,${{ github.workspace }}/target/ghostty-vt-bridge/lib
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: ${{ env.NIGHTLY_TOOLCHAIN }}
      - name: Install Zig
        run: |
          ZIG_VERSION=0.15.2
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "${PWD}/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libavahi-client-dev
      - name: Build Ghostty VT bridge
        run: ./scripts/build-ghostty-vt-bridge.sh
      - name: Test arbor-terminal-emulator with Ghostty VT
        run: cargo +${{ env.NIGHTLY_TOOLCHAIN }} test -p arbor-terminal-emulator --features ghostty-vt-experimental
      - name: Check arbor-gui with Ghostty VT
        run: cargo +${{ env.NIGHTLY_TOOLCHAIN }} check -p arbor-gui --features ghostty-vt-experimental
      - name: Check arbor-httpd with Ghostty VT
        run: cargo +${{ env.NIGHTLY_TOOLCHAIN }} check -p arbor-httpd --features ghostty-vt-experimental

  build-macos:
    name: Build macOS app
    needs: [fmt, clippy, test, ghostty-vt]
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: ${{ env.NIGHTLY_TOOLCHAIN }}
      - name: Add Rust targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
      - name: Build macOS binaries
        env:
          ARBOR_VERSION: ${{ github.ref_name }}
        run: |
          cargo +${{ env.NIGHTLY_TOOLCHAIN }} build --locked --release -p arbor-gui --features vendored-openssl --target aarch64-apple-darwin
          cargo +${{ env.NIGHTLY_TOOLCHAIN }} build --locked --release -p arbor-gui --features vendored-openssl --target x86_64-apple-darwin
          cargo +${{ env.NIGHTLY_TOOLCHAIN }} build --locked --release -p arbor-httpd --features vendored-openssl --target aarch64-apple-darwin
          cargo +${{ env.NIGHTLY_TOOLCHAIN }} build --locked --release -p arbor-httpd --features vendored-openssl --target x86_64-apple-darwin
          cargo +${{ env.NIGHTLY_TOOLCHAIN }} build --locked --release -p arbor-mcp --features stdio-server,vendored-openssl --target aarch64-apple-darwin
          cargo +${{ env.NIGHTLY_TOOLCHAIN }} build --locked --release -p arbor-mcp --features stdio-server,vendored-openssl --target x86_64-apple-darwin
      - name: Build web UI assets
        working-directory: crates/arbor-web-ui/app
        run: npm ci --no-audit --no-fund && npm run build
      - name: Package macOS app
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/Arbor \
            target/x86_64-apple-darwin/release/Arbor \
            -output dist/Arbor
          lipo -create \
            target/aarch64-apple-darwin/release/arbor-httpd \
            target/x86_64-apple-darwin/release/arbor-httpd \
            -output dist/arbor-httpd
          lipo -create \
            target/aarch64-apple-darwin/release/arbor-mcp \
            target/x86_64-apple-darwin/release/arbor-mcp \
            -output dist/arbor-mcp
          ./scripts/ci/package-macos.sh "$TAG" "universal2-apple-darwin" "dist/Arbor" "dist"
      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
              -P "$MACOS_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 \
              -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASSWORD" \
              "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/certificate.p12"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
      - name: Codesign app bundle
        if: env.KEYCHAIN_PATH != ''
        shell: bash
        run: |
          APP_PATH="dist/Arbor.app"
          HTTPD_BIN="${APP_PATH}/Contents/MacOS/arbor-httpd"
          MCP_BIN="${APP_PATH}/Contents/MacOS/arbor-mcp"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Signing with identity: $IDENTITY"

          if [[ ! -f "${HTTPD_BIN}" ]]; then
            echo "error: expected arbor-httpd in app bundle at ${HTTPD_BIN}" >&2
            exit 1
          fi

          if [[ ! -f "${MCP_BIN}" ]]; then
            echo "error: expected arbor-mcp in app bundle at ${MCP_BIN}" >&2
            exit 1
          fi

          /usr/bin/codesign --force --timestamp --options runtime \
              --entitlements packaging/macos/Arbor.entitlements \
              --sign "$IDENTITY" \
              "${HTTPD_BIN}" -v

          /usr/bin/codesign --force --timestamp --options runtime \
              --entitlements packaging/macos/Arbor.entitlements \
              --sign "$IDENTITY" \
              "${MCP_BIN}" -v

          /usr/bin/codesign --force --timestamp --options runtime \
              --entitlements packaging/macos/Arbor.entitlements \
              --sign "$IDENTITY" \
              "${APP_PATH}/Contents/MacOS/Arbor" -v

          /usr/bin/codesign --force --timestamp --options runtime \
              --entitlements packaging/macos/Arbor.entitlements \
              --sign "$IDENTITY" \
              "${APP_PATH}" -v

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
      - name: Notarize app bundle
        if: env.KEYCHAIN_PATH != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          APP_PATH="dist/Arbor.app"

          xcrun notarytool store-credentials "notarytool-profile" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_ID_PASSWORD"

          /usr/bin/ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/notarization.zip"

          xcrun notarytool submit "$RUNNER_TEMP/notarization.zip" \
              --keychain-profile "notarytool-profile" \
              --wait

          xcrun stapler staple "$APP_PATH"
          rm -f "$RUNNER_TEMP/notarization.zip"
      - name: Re-create distributable archive
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          ARCHIVE_NAME="Arbor-${TAG}-universal2-apple-darwin.app.zip"
          rm -f "dist/${ARCHIVE_NAME}"
          /usr/bin/ditto -c -k --keepParent --norsrc "dist/Arbor.app" "dist/${ARCHIVE_NAME}"
      - name: Clean up keychain
        if: always()
        shell: bash
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-macos
          path: dist/*.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux app (${{ matrix.target }})
    needs: [fmt, clippy, test, ghostty-vt]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: ${{ env.NIGHTLY_TOOLCHAIN }}
      - name: Install Linux x86_64 GUI dependencies
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libavahi-client-dev
      - name: Install Linux ARM64 toolchain and GUI dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64

          # Restrict existing sources to amd64 only, then add the ports
          # mirror for arm64 packages (the default mirrors don't carry arm64).
          # Ubuntu 24.04 uses deb822 (.sources) format; pin with Architectures.
          sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          # Also handle any traditional .list files (skip those with existing [arch=]).
          for f in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo sed -i '/^\s*#/!s/^deb \([^[]\)/deb [arch=amd64] \1/' "$f" 2>/dev/null || true
          done
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libxcb1-dev:arm64 \
            libxkbcommon-dev:arm64 \
            libxkbcommon-x11-dev:arm64 \
            libssl-dev:arm64 \
            zlib1g-dev:arm64 \
            libavahi-client-dev:arm64
      - name: Add Rust target
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"
      - name: Build Linux binaries
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARBOR_VERSION: ${{ github.ref_name }}
        run: |
          if [[ "$TARGET" == "aarch64-unknown-linux-gnu" ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
            export PKG_CONFIG_ALLOW_CROSS=1
          fi
          cargo +${{ env.NIGHTLY_TOOLCHAIN }} build --locked --release -p arbor-gui --features vendored-openssl --target "$TARGET"
          cargo +${{ env.NIGHTLY_TOOLCHAIN }} build --locked --release -p arbor-httpd --features vendored-openssl --target "$TARGET"
          cargo +${{ env.NIGHTLY_TOOLCHAIN }} build --locked --release -p arbor-mcp --features stdio-server,vendored-openssl --target "$TARGET"
      - name: Build web UI assets
        working-directory: crates/arbor-web-ui/app
        run: npm ci --no-audit --no-fund && npm run build
      - name: Package Linux app
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist
          ./scripts/ci/package-linux.sh "$TAG" "$TARGET" "target/${TARGET}/release/Arbor" "dist"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-linux-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows app
    needs: [fmt, clippy, test, ghostty-vt]
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: ${{ env.NIGHTLY_TOOLCHAIN }}
      - name: Add Rust target
        run: rustup target add x86_64-pc-windows-msvc
      - name: Build Windows binaries
        env:
          ARBOR_VERSION: ${{ github.ref_name }}
        run: |
          cargo +${{ env.NIGHTLY_TOOLCHAIN }} build --locked --release -p arbor-gui --features vendored-openssl --target x86_64-pc-windows-msvc
          cargo +${{ env.NIGHTLY_TOOLCHAIN }} build --locked --release -p arbor-httpd --features vendored-openssl --target x86_64-pc-windows-msvc
          cargo +${{ env.NIGHTLY_TOOLCHAIN }} build --locked --release -p arbor-mcp --features stdio-server,vendored-openssl --target x86_64-pc-windows-msvc
      - name: Build web UI assets
        working-directory: crates/arbor-web-ui/app
        run: npm ci --no-audit --no-fund && npm run build
      - name: Package Windows app
        env:
          TAG: ${{ github.ref_name }}
        run: |
          New-Item -Path dist -ItemType Directory -Force | Out-Null
          .\scripts\ci\package-windows.ps1 -Tag "$env:TAG" -TargetTriple "x86_64-pc-windows-msvc" -BinaryPath "target\x86_64-pc-windows-msvc\release\Arbor.exe" -OutputDir "dist"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-windows
          path: dist/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ls -lah dist
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber
          else
            gh release create "${tag}" dist/* --title "${tag}" --generate-notes
          fi

  update-homebrew:
    name: Update Homebrew Tap
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-macos
          path: dist
      - name: Update Homebrew cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          macos_zip="dist/Arbor-${tag}-universal2-apple-darwin.app.zip"
          sha256=$(sha256sum "${macos_zip}" | awk '{print $1}')

          cask_content=$(./scripts/ci/update-homebrew-cask.sh "${tag}" "${sha256}")

          # Clone the tap repo and update the cask
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/penso/homebrew-arbor.git" tap
          mkdir -p tap/Casks
          echo "${cask_content}" > tap/Casks/arbor.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/arbor.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update arbor to ${tag}"
            git push
          fi
